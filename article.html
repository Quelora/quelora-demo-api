<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quelora - Article</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./quelora/css/quelora.css">
    <link rel="stylesheet" href="./quelora/css/quelora-enterprise.css">
    <style>
        :root {
            --primary-color: #0055d4;
            --secondary-color: #4a90e2;
            --background-color: #f0f2f5;
            --surface-color: #ffffff;
            --on-surface-primary: #1a1a1b;
            --on-surface-secondary: #65676b;
            --border-color: #dddfe2;
            --card-border-radius: 12px;
            --header-height: 64px;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.05);
            --header-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --icon-filter: none;
            --article-max-width: 1200px;
        }

        body.dark-theme {
            --primary-color: #4a90e2;
            --secondary-color: #6ba5e9;
            --background-color: #121212;
            --surface-color: #1e1e1e;
            --on-surface-primary: #e4e6eb;
            --on-surface-secondary: #b0b3b8;
            --border-color: #3a3b3c;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.5);
            --header-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            --icon-filter: invert(1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: var(--background-color);
            font-family: 'Roboto', sans-serif;
            color: var(--on-surface-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            padding: 0 24px;
            background-color: var(--surface-color);
            box-shadow: var(--header-shadow);
        }

        .header-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--on-surface-primary);
            font-size: 24px;
            font-weight: 800;
        }

        .header-logo img {
            height: 40px;
            margin-right: 10px;
            border-radius: 50%;
        }

        .icon-btn {
            background: transparent;
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--on-surface-secondary);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            filter: var(--icon-filter);
        }

        .article-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            max-width: var(--article-max-width);
            margin: 40px auto;
            padding: 0 24px;
            width: 100%;
        }

        .article-main {
            background-color: var(--surface-color);
            border-radius: var(--card-border-radius);
            box-shadow: var(--shadow-light);
            overflow: hidden;
        }

        .article-hero {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .article-content-wrapper {
            padding: 40px;
        }

        .article-title {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--on-surface-secondary);
            font-size: 14px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .article-body {
            font-size: 18px;
            line-height: 1.8;
            color: var(--on-surface-primary);
        }

        .article-body p {
            margin-bottom: 24px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
        }

        .sidebar-card {
            display: flex;
            flex-direction: column;
            background-color: var(--surface-color);
            border-radius: var(--card-border-radius);
            box-shadow: var(--shadow-light);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
            margin-bottom: 16px;
        }

        .sidebar-card:hover {
            transform: translateY(-4px);
        }

        .sidebar-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .sidebar-card-content {
            padding: 16px;
        }

        .sidebar-card-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 8px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sidebar-card-meta {
            font-size: 12px;
            color: var(--on-surface-secondary);
        }

        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        #loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 960px) {
            .article-layout {
                grid-template-columns: 1fr;
            }
            .article-hero {
                height: 250px;
            }
            .article-title {
                font-size: 28px;
            }
            .article-content-wrapper {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <header class="app-header">
        <a href="index.html" class="header-logo">
            <img src="https://avatars.githubusercontent.com/u/224778839?v=4" alt="Quelora Logo">Quelora
        </a>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">
            <svg id="themeIconSun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"></path>
            </svg>
            <svg id="themeIconMoon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
                <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"></path>
            </svg>
        </button>
    </header>

    <main class="article-layout">
        <article class="article-main" id="articleMainContainer">
            </article>

        <aside class="sidebar-section">
            <h3 class="sidebar-title">Most Read</h3>
            <div id="sidebarContainer">
                </div>
        </aside>
    </main>

    <script type="module" src="./article.js"></script>
    <script type="module" src="./js/quelora.index.conf.js"></script>
    <script type="module" src="./quelora/js/quelora.js"></script>
</body>
</html>
